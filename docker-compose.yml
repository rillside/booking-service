services:
  # Сервис базы данных
  db:
    image: postgres:15-alpine
    container_name: booking_db_container
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-my_secret_password}
      POSTGRES_DB: ${POSTGRES_DB:-booking_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-booking_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # FastAPI веб-сервис
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: booking_web_container
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=db
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
